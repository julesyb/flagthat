<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 2: Gameplay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    background: #F5EFE6;
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .headline {
    text-align: center;
    padding: 160px 100px 20px;
    flex-shrink: 0;
    z-index: 2;
  }
  .headline h1 {
    font-family: 'Barlow', sans-serif;
    font-size: 108px;
    font-weight: 900;
    color: #1A1820;
    line-height: 1.0;
    letter-spacing: -3px;
  }
  .headline h1 em {
    font-family: 'Libre Baskerville', serif;
    font-weight: 700;
    font-style: italic;
    color: #9A5C0A;
  }
  .headline .sub {
    font-size: 36px;
    font-weight: 500;
    color: #8A8494;
    margin-top: 16px;
  }

  /* ── Phone ── */
  .phone-wrap {
    position: relative;
    flex-shrink: 0;
    z-index: 1;
    margin-top: 60px;
  }

  .phone {
    width: 1080px;
    height: 2400px;
    background: linear-gradient(180deg, #7A7680 0%, #5E5A64 50%, #7A7680 100%);
    border-radius: 58px;
    padding: 2px;
    position: relative;
  }

  .phone::before {
    content: '';
    position: absolute;
    right: -3px; top: 280px;
    width: 3px; height: 80px;
    background: linear-gradient(180deg, #7A7680, #5E5A64, #7A7680);
    border-radius: 0 2px 2px 0;
  }

  .phone-inner {
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 56px;
    padding: 5px;
    position: relative;
  }

  .phone-inner::before {
    content: '';
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 126px; height: 36px;
    background: #000; border-radius: 20px; z-index: 10;
  }

  .screen {
    width: 100%;
    height: 100%;
    background: #F5EFE6;
    border-radius: 52px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Gameplay: focused on the flag + answers ── */

  .status-bar {
    padding: 18px 44px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 19px;
    font-weight: 600;
    color: #1A1820;
  }

  /* Progress bar */
  .progress { height: 5px; background: rgba(0,0,0,0.08); margin: 0 44px; border-radius: 3px; }
  .progress-fill { height: 100%; background: #1A1820; border-radius: 3px; width: 70%; }

  /* Game top bar */
  .game-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 44px 8px;
  }
  .exit-btn {
    font-size: 20px; font-weight: 600; color: #8A8494;
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .game-center { text-align: center; }
  .game-count { font-size: 26px; font-weight: 700; color: #1A1820; }
  .game-streak {
    font-size: 20px; font-weight: 600; color: #9A5C0A;
    display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px;
  }
  .game-score { font-size: 20px; font-weight: 600; color: #1E8F56; }

  /* Flag - HUGE and centered */
  .flag-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 50px;
  }
  .flag-img {
    width: 620px;
    aspect-ratio: 3/2;
    border-radius: 22px;
    overflow: hidden;
    background: #EDE7DE;
  }
  .flag-img img { width: 100%; height: 100%; object-fit: cover; }

  /* Feedback */
  .feedback {
    text-align: center;
    padding: 0 44px 16px;
  }
  .feedback-text {
    font-size: 34px; font-weight: 700; color: #1E8F56;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .feedback-detail {
    font-size: 22px; font-weight: 500; color: #5C5764; margin-top: 6px;
  }

  /* Answer buttons - big and readable */
  .answers {
    display: flex; flex-direction: column; gap: 14px;
    padding: 0 44px 48px;
  }
  .ans {
    height: 80px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 600; color: #1A1820;
    background: #FFFFFF; border: 2px solid rgba(0,0,0,0.08);
    position: relative;
  }
  .ans.correct {
    background: #1E8F56; border-color: #1E8F56; color: #FFFFFF;
  }
  .ans .check {
    position: absolute; right: 28px;
  }
</style>
</head>
<body>

<div class="headline">
  <h1>Guess the flag.<br><em>Beat your best.</em></h1>
  <div class="sub">Streak mode keeps you sharp.</div>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="phone-inner">
      <div class="screen">
        <div class="status-bar">
          <span>9:41</span>
          <svg width="18" height="12" viewBox="0 0 20 14" fill="#1A1820"><rect x="0" y="8" width="3" height="6" rx="0.5"/><rect x="5" y="5" width="3" height="9" rx="0.5"/><rect x="10" y="2" width="3" height="12" rx="0.5"/><rect x="15" y="0" width="3" height="14" rx="0.5"/></svg>
        </div>
        <div class="progress"><div class="progress-fill"></div></div>
        <div class="game-bar">
          <div class="exit-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8A8494" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
            Exit
          </div>
          <div class="game-center">
            <div class="game-count">7 of 10</div>
            <div class="game-streak">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#9A5C0A"><path d="M13.5 0.67C13.5 0.67 14.24 3.32 14.24 5.47C14.24 7.53 12.89 9.2 10.83 9.2C8.76 9.2 7.2 7.53 7.2 5.47L7.23 5.11C5.21 7.51 4 10.62 4 14C4 18.42 7.58 22 12 22C16.42 22 20 18.42 20 14C20 8.61 17.41 3.8 13.5 0.67Z"/></svg>
              Streak 5
            </div>
          </div>
          <div class="game-score">6 correct</div>
        </div>

        <div class="flag-zone">
          <div class="flag-img"><img src="https://flagcdn.com/w640/jp.png" alt="Japan"></div>
        </div>

        <div class="feedback">
          <div class="feedback-text">Correct!</div>
        </div>

        <div class="answers">
          <div class="ans correct">
            Japan
            <span class="check"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="3"><polyline points="4 12 10 18 20 6"/></svg></span>
          </div>
          <div class="ans">South Korea</div>
          <div class="ans">Bangladesh</div>
          <div class="ans">Palau</div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
