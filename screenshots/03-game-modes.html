<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 3: Game Modes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── TEMPLATE: dark bg ── */
  body {
    width: 1290px; height: 2796px; overflow: hidden;
    background: #1A1820;
    font-family: 'Barlow', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  body::before {
    content: ''; position: absolute; top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1400px; height: 1400px;
    background: radial-gradient(circle, rgba(233,186,76,0.07) 0%, transparent 65%);
    pointer-events: none;
  }
  .headline {
    text-align: center; padding: 140px 100px 20px;
    flex-shrink: 0; z-index: 2;
  }
  .headline h1 {
    font-family: 'Barlow', sans-serif;
    font-size: 108px; font-weight: 900; color: #FFFFFF;
    line-height: 1.0; letter-spacing: -3px;
  }
  .headline h1 em {
    font-family: 'Libre Baskerville', serif;
    font-weight: 700; font-style: italic; color: #E9BA4C;
  }
  .headline .sub {
    font-size: 36px; font-weight: 500; color: rgba(255,255,255,0.40);
    margin-top: 18px; letter-spacing: 1px;
  }
  .phone-wrap { position: relative; flex-shrink: 0; z-index: 1; margin-top: 50px; }
  .phone {
    width: 1080px; height: 2400px;
    background: linear-gradient(180deg, #7A7680 0%, #5E5A64 50%, #7A7680 100%);
    border-radius: 58px; padding: 2px; position: relative;
  }
  .phone::before {
    content: ''; position: absolute; right: -3px; top: 280px;
    width: 3px; height: 80px;
    background: linear-gradient(180deg, #7A7680, #5E5A64, #7A7680);
    border-radius: 0 2px 2px 0;
  }
  .phone-inner {
    width: 100%; height: 100%; background: #000;
    border-radius: 56px; padding: 5px; position: relative;
  }
  .phone-inner::before {
    content: ''; position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 126px; height: 36px; background: #000;
    border-radius: 20px; z-index: 10;
  }
  .screen {
    width: 100%; height: 100%; background: #F5EFE6;
    border-radius: 52px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar {
    padding: 18px 50px 10px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 20px; font-weight: 600; color: #1A1820;
  }

  /* ── SCREEN CONTENT: Game Setup ── */
  .screen-content {
    flex: 1; padding: 20px 60px 0;
    display: flex; flex-direction: column; overflow: hidden;
  }

  .page-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 72px; font-weight: 700; color: #1A1820;
    letter-spacing: -1px; padding: 10px 0 36px;
  }

  .mode-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 36px; }
  .mode-card {
    width: calc(50% - 10px); background: #FFFFFF;
    border: 3px solid rgba(0,0,0,0.06); border-radius: 26px;
    padding: 36px 24px; text-align: center;
  }
  .mode-card.active {
    border-color: rgba(233,186,76,0.50); background: rgba(233,186,76,0.08);
  }
  .mode-icon-wrap {
    width: 84px; height: 84px; background: #EDE7DE; border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .mode-card.active .mode-icon-wrap { background: rgba(233,186,76,0.15); }
  .mc-name { font-size: 38px; font-weight: 700; color: #1A1820; }
  .mode-card.active .mc-name { color: #E9BA4C; }
  .mc-desc { font-size: 26px; color: #8A8494; margin-top: 6px; font-weight: 500; }

  .section-label {
    font-size: 28px; font-weight: 700; color: #8A8494;
    text-transform: uppercase; letter-spacing: 4px; margin: 12px 0 20px;
  }
  .diff-row { display: flex; gap: 18px; margin-bottom: 36px; }
  .diff-pill {
    flex: 1; padding: 28px; border-radius: 22px;
    border: 3px solid rgba(0,0,0,0.06); background: #FFFFFF;
    text-align: center; font-size: 32px; font-weight: 700; color: #8A8494;
  }
  .diff-pill.easy { background: rgba(30,143,86,0.08); border-color: rgba(30,143,86,0.30); color: #1E8F56; }
  .diff-pill.med { background: rgba(233,186,76,0.10); border-color: rgba(154,92,10,0.25); color: #E9BA4C; }
  .diff-pill.hard { background: rgba(196,48,48,0.08); border-color: rgba(196,48,48,0.30); color: #C43030; }

  .config-card {
    background: #FFFFFF; border-radius: 26px;
    border: 3px solid rgba(0,0,0,0.06); padding: 28px 34px;
  }
  .config-row {
    display: flex; align-items: center; justify-content: space-between; padding: 18px 0;
  }
  .config-row + .config-row { border-top: 1.5px solid rgba(0,0,0,0.06); }
  .config-label { font-size: 36px; font-weight: 500; color: #5C5764; }
  .seg-group { display: flex; gap: 12px; }
  .seg {
    padding: 18px 28px; border-radius: 16px; font-size: 30px; font-weight: 600;
    background: #FFF; border: 2.5px solid rgba(0,0,0,0.06); color: #8A8494;
    min-width: 72px; text-align: center;
  }
  .seg.on { background: #E9BA4C; border-color: #E9BA4C; color: #130F00; }

  .start-area {
    margin-top: auto; border-top: 1.5px solid rgba(0,0,0,0.06);
    padding: 24px 60px 50px; background: #F5EFE6;
  }
  .start-btn {
    background: #E9BA4C; border-radius: 26px; padding: 38px;
    text-align: center; box-shadow: 0 8px 0 #5C3506;
    font-size: 44px; font-weight: 700; color: #130F00;
    text-transform: uppercase; letter-spacing: 3px;
  }
</style>
</head>
<body>

<div class="headline">

</div>

<div class="phone-wrap">

              <div class="mc-name">Flag Puzzle</div>

            <div class="mode-card">
              <div class="mode-icon-wrap"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#8A8494" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg></div>
              <div class="mc-name">Time Attack</div>

            <div class="mode-card">
