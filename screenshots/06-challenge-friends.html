<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 6: Browse Flags</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── TEMPLATE: light bg ── */
  body {
    width: 1290px; height: 2796px; overflow: hidden;
    background: #F5EFE6;
    font-family: 'Barlow', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .headline {
    text-align: center; padding: 140px 100px 20px;
    flex-shrink: 0; z-index: 2;
  }
  .headline h1 {
    font-family: 'Barlow', sans-serif;
    font-size: 108px; font-weight: 900; color: #1A1820;
    line-height: 1.0; letter-spacing: -3px;
  }
  .headline h1 em {
    font-family: 'Libre Baskerville', serif;
    font-weight: 700; font-style: italic; color: #9A5C0A;
  }
  .headline .sub {
    font-size: 36px; font-weight: 500; color: #8A8494;
    margin-top: 18px; letter-spacing: 1px;
  }
  .phone-wrap { position: relative; flex-shrink: 0; z-index: 1; margin-top: 50px; }
  .phone {
    width: 1080px; height: 2400px;
    background: linear-gradient(180deg, #7A7680 0%, #5E5A64 50%, #7A7680 100%);
    border-radius: 58px; padding: 2px; position: relative;
  }
  .phone::before {
    content: ''; position: absolute; right: -3px; top: 280px;
    width: 3px; height: 80px;
    background: linear-gradient(180deg, #7A7680, #5E5A64, #7A7680);
    border-radius: 0 2px 2px 0;
  }
  .phone-inner {
    width: 100%; height: 100%; background: #000;
    border-radius: 56px; padding: 5px; position: relative;
  }
  .phone-inner::before {
    content: ''; position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 126px; height: 36px; background: #000;
    border-radius: 20px; z-index: 10;
  }
  .screen {
    width: 100%; height: 100%; background: #F5EFE6;
    border-radius: 52px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar {
    padding: 18px 50px 10px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 20px; font-weight: 600; color: #1A1820;
  }

  /* ── SCREEN CONTENT: Browse Flags ── */
  .screen-content {
    flex: 1; padding: 20px 60px 0;
    display: flex; flex-direction: column; overflow: hidden;
  }

  .page-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 72px; font-weight: 700; color: #1A1820;
    letter-spacing: -1px; padding: 10px 0 10px;
  }
  .page-sub {
    font-size: 32px; font-weight: 500; color: #8A8494; margin-bottom: 28px;
  }

  .search {
    display: flex; align-items: center; gap: 18px;
    background: #FFFFFF; border-radius: 999px; padding: 26px 34px;
    border: 3px solid rgba(0,0,0,0.06); margin-bottom: 24px;
  }
  .search-text { font-size: 32px; font-weight: 400; color: #8A8494; }

  .chips { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
  .chip {
    padding: 16px 32px; border-radius: 999px; background: #FFFFFF;
    border: 3px solid rgba(0,0,0,0.06);
    font-size: 28px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: #5C5764;
  }
  .chip.active { background: #E9BA4C; border-color: #E9BA4C; color: #130F00; }

  .count { font-size: 28px; color: #8A8494; font-weight: 500; margin-bottom: 24px; }

  .flag-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 20px; flex: 1; overflow: hidden;
  }
  .flag-card { text-align: center; }
  .flag-wrap {
    width: 100%; aspect-ratio: 3/2; border-radius: 18px;
    overflow: hidden;
  }
  .flag-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .flag-name {
    font-size: 28px; font-weight: 600; color: #1A1820; margin-top: 12px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
</style>
</head>
<body>

<div class="headline">
  <h1>Explore <em>197 flags</em></h1>
  <div class="sub">Learn about every country.</div>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="phone-inner">
      <div class="screen">
        <div class="status-bar">

        </div>
        <div class="screen-content">

            <span class="search-text">Search flags...</span>

          <div class="chips">

            <div class="chip">Africa</div>
            <div class="chip">Asia</div>
            <div class="chip">Europe</div>
            <div class="chip">Americas</div>
            <div class="chip">Oceania</div>

          <div class="count">197 flags</div>

          <div class="flag-grid">
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/af.png" alt=""></div>
              <div class="flag-name">Afghanistan</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/al.png" alt=""></div>
              <div class="flag-name">Albania</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/dz.png" alt=""></div>
              <div class="flag-name">Algeria</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/ad.png" alt=""></div>
              <div class="flag-name">Andorra</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/ao.png" alt=""></div>
              <div class="flag-name">Angola</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/ag.png" alt=""></div>
              <div class="flag-name">Antigua</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/ar.png" alt=""></div>
              <div class="flag-name">Argentina</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/am.png" alt=""></div>
              <div class="flag-name">Armenia</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/au.png" alt=""></div>
              <div class="flag-name">Australia</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/at.png" alt=""></div>
              <div class="flag-name">Austria</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/az.png" alt=""></div>
              <div class="flag-name">Azerbaijan</div>
            </div>
            <div class="flag-card">
              <div class="flag-wrap"><img src="https://flagcdn.com/w320/bs.png" alt=""></div>
              <div class="flag-name">Bahamas</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
