<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 4: Results</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── TEMPLATE: light bg ── */
  body {
    width: 1290px; height: 2796px; overflow: hidden;
    background: #F5EFE6;
    font-family: 'Barlow', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .headline {
    text-align: center; padding: 140px 100px 20px;
    flex-shrink: 0; z-index: 2;
  }
  .headline h1 {
    font-family: 'Barlow', sans-serif;
    font-size: 108px; font-weight: 900; color: #1A1820;
    line-height: 1.0; letter-spacing: -3px;
  }
  .headline h1 em {
    font-family: 'Libre Baskerville', serif;
    font-weight: 700; font-style: italic; color: #9A5C0A;
  }
  .headline .sub {
    font-size: 36px; font-weight: 500; color: #8A8494;
    margin-top: 18px; letter-spacing: 1px;
  }
  .phone-wrap { position: relative; flex-shrink: 0; z-index: 1; margin-top: 50px; }
  .phone {
    width: 1080px; height: 2400px;
    background: linear-gradient(180deg, #7A7680 0%, #5E5A64 50%, #7A7680 100%);
    border-radius: 58px; padding: 2px; position: relative;
  }
  .phone::before {
    content: ''; position: absolute; right: -3px; top: 280px;
    width: 3px; height: 80px;
    background: linear-gradient(180deg, #7A7680, #5E5A64, #7A7680);
    border-radius: 0 2px 2px 0;
  }
  .phone-inner {
    width: 100%; height: 100%; background: #000;
    border-radius: 56px; padding: 5px; position: relative;
  }
  .phone-inner::before {
    content: ''; position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 126px; height: 36px; background: #000;
    border-radius: 20px; z-index: 10;
  }
  .screen {
    width: 100%; height: 100%; background: #F5EFE6;
    border-radius: 52px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar {
    padding: 18px 50px 10px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 20px; font-weight: 600; color: #1A1820;
  }

  /* ── SCREEN CONTENT: Results ── */
  .screen-content {
    flex: 1; padding: 28px 60px 0;
    display: flex; flex-direction: column; align-items: center; overflow: hidden;
  }

  .score-card {
    background: #FFFFFF; border-radius: 32px;
    padding: 56px 40px 44px; text-align: center; width: 100%;
    border: 3px solid rgba(233,186,76,0.25); margin-bottom: 36px;
  }
  .score-eyebrow {
    font-size: 30px; font-weight: 700; color: #8A8494;
    text-transform: uppercase; letter-spacing: 4px; margin-bottom: 12px;
  }
  .score-huge {
    font-family: 'Libre Baskerville', serif;
    font-size: 240px; font-weight: 700; color: #1A1820;
    line-height: 1; letter-spacing: -12px;
  }
  .score-sub { font-size: 38px; font-weight: 500; color: #5C5764; margin-top: 12px; }

  .stats-card {
    background: #FFFFFF; border-radius: 32px;
    border: 3px solid rgba(0,0,0,0.06);
    padding: 40px; width: 100%; margin-bottom: 36px;
  }
  .dots { display: flex; gap: 16px; margin-bottom: 36px; justify-content: center; }
  .dot { width: 40px; height: 40px; border-radius: 10px; }
  .dot.g { background: #1E8F56; }
  .dot.r { background: #C43030; }
  .stats-divider { height: 1.5px; background: rgba(0,0,0,0.06); margin-bottom: 32px; }
  .stats-cols { display: flex; }
  .stat { flex: 1; text-align: center; position: relative; }
  .stat + .stat::before {
    content: ''; position: absolute; left: 0; top: 4px;
    height: 72px; width: 1.5px; background: rgba(0,0,0,0.06);
  }
  .stat-num {
    font-family: 'Libre Baskerville', serif;
    font-size: 56px; font-weight: 700; color: #1A1820;
  }
  .stat-unit { font-size: 30px; color: #5C5764; font-weight: 500; }
  .stat-label {
    font-size: 24px; font-weight: 700; color: #8A8494;
    text-transform: uppercase; letter-spacing: 2px; margin-top: 6px;
  }
  .new-best {
    display: inline-block; background: rgba(233,186,76,0.12);
    border-radius: 999px; padding: 8px 20px; margin-top: 10px;
    font-size: 22px; font-weight: 700; color: #9A5C0A;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .btn-row { display: flex; gap: 20px; width: 100%; margin-bottom: 36px; }
  .btn-gold {
    flex: 1; background: #E9BA4C; border-radius: 26px; padding: 36px;
    text-align: center; box-shadow: 0 8px 0 #5C3506;
  }
  .btn-gold-text { font-size: 40px; font-weight: 700; color: #130F00; text-transform: uppercase; letter-spacing: 2px; }
  .btn-outline {
    flex: 1; background: #FFFFFF; border: 3px solid rgba(0,0,0,0.08);
    border-radius: 26px; padding: 36px; text-align: center;
  }
  .btn-outline-text { font-size: 40px; font-weight: 700; color: #5C5764; text-transform: uppercase; letter-spacing: 2px; }

  .review-title {
    font-size: 44px; font-weight: 700; color: #1A1820;
    margin-bottom: 22px; align-self: flex-start;
  }
  .review-list { width: 100%; }
  .review-item {
    display: flex; align-items: center; background: #FFFFFF;
    border-radius: 24px; padding: 28px 30px; margin-bottom: 18px;
    gap: 22px; position: relative; overflow: hidden;
  }
  .ri-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 8px; }
  .ri-num {
    font-family: 'Libre Baskerville', serif;
    font-size: 32px; font-weight: 700; min-width: 36px;
    text-align: center; margin-left: 16px;
  }
  .ri-flag {
    width: 80px; height: 56px; border-radius: 10px;
    overflow: hidden; flex-shrink: 0;
  }
  .ri-flag img { width: 100%; height: 100%; object-fit: cover; }
  .ri-name { flex: 1; font-size: 36px; font-weight: 600; color: #1A1820; }
  .ri-time { font-size: 30px; font-weight: 500; color: #8A8494; }
</style>
</head>
<body>

<div class="headline">
  <h1>Track <em>every</em> answer</h1>
  <div class="sub">Detailed results after each game.</div>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="phone-inner">
      <div class="screen">
        <div class="status-bar">
          <span>9:41</span>
          <svg width="18" height="12" viewBox="0 0 20 14" fill="#1A1820"><rect x="0" y="8" width="3" height="6" rx="0.5"/><rect x="5" y="5" width="3" height="9" rx="0.5"/><rect x="10" y="2" width="3" height="12" rx="0.5"/><rect x="15" y="0" width="3" height="14" rx="0.5"/></svg>
        </div>
        <div class="screen-content">
          <div class="score-card">
            <div class="score-eyebrow">Daily Challenge</div>
            <div class="score-huge">90%</div>
            <div class="score-sub">9 of 10 correct</div>
          </div>
          <div class="stats-card">
            <div class="dots">
              <div class="dot g"></div><div class="dot g"></div><div class="dot g"></div><div class="dot g"></div><div class="dot r"></div>
              <div class="dot g"></div><div class="dot g"></div><div class="dot g"></div><div class="dot g"></div><div class="dot g"></div>
            </div>
            <div class="stats-divider"></div>
            <div class="stats-cols">
              <div class="stat">
                <div class="stat-num">5</div>
                <div class="stat-label">Best Streak</div>
                <div class="new-best">New Best</div>
              </div>
              <div class="stat">
                <div class="stat-num">2.1<span class="stat-unit">s</span></div>
                <div class="stat-label">Avg Time</div>
              </div>
              <div class="stat">
                <div class="stat-num">1.2<span class="stat-unit">s</span></div>
                <div class="stat-label">Fastest</div>
              </div>
            </div>
          </div>
          <div class="btn-row">
            <div class="btn-gold"><span class="btn-gold-text">Play Again</span></div>
            <div class="btn-outline"><span class="btn-outline-text">Share</span></div>
          </div>
          <div class="review-title">Review</div>
          <div class="review-list">
            <div class="review-item">
              <div class="ri-bar" style="background:#1E8F56"></div>
              <div class="ri-num" style="color:#1E8F56">1</div>
              <div class="ri-flag"><img src="https://flagcdn.com/w160/br.png" alt=""></div>
              <span class="ri-name">Brazil</span>
              <span class="ri-time">1.8s</span>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#1E8F56" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg>
            </div>
            <div class="review-item">
              <div class="ri-bar" style="background:#1E8F56"></div>
              <div class="ri-num" style="color:#1E8F56">2</div>
              <div class="ri-flag"><img src="https://flagcdn.com/w160/jp.png" alt=""></div>
              <span class="ri-name">Japan</span>
              <span class="ri-time">1.2s</span>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#1E8F56" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg>
            </div>
            <div class="review-item">
              <div class="ri-bar" style="background:#C43030"></div>
              <div class="ri-num" style="color:#C43030">3</div>
              <div class="ri-flag"><img src="https://flagcdn.com/w160/td.png" alt=""></div>
              <span class="ri-name">Chad</span>
              <span class="ri-time">4.1s</span>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#C43030" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
            </div>
            <div class="review-item">
              <div class="ri-bar" style="background:#1E8F56"></div>
              <div class="ri-num" style="color:#1E8F56">4</div>
              <div class="ri-flag"><img src="https://flagcdn.com/w160/ke.png" alt=""></div>
              <span class="ri-name">Kenya</span>
              <span class="ri-time">1.5s</span>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#1E8F56" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
