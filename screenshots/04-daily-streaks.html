<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 4: Results</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    background: #F5EFE6;
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .headline {
    text-align: center;
    padding: 140px 80px 50px;
  }
  .headline h1 {
    font-family: 'Barlow', sans-serif;
    font-size: 78px;
    font-weight: 800;
    color: #1A1820;
    line-height: 1.12;
    letter-spacing: -1px;
  }
  .headline h1 em {
    font-style: italic;
    color: #9A5C0A;
  }

  /* Phone */
  .phone {
    width: 860px;
    height: 1860px;
    background: #000000;
    border-radius: 72px;
    padding: 14px;
    position: relative;
    flex-shrink: 0;
  }
  .phone::before {
    content: '';
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 40px;
    background: #000000;
    border-radius: 20px;
    z-index: 10;
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #F5EFE6;
    border-radius: 60px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .status-bar {
    padding: 22px 40px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    font-weight: 600;
    color: #1A1820;
  }

  .app-content {
    flex: 1;
    padding: 8px 32px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Hero score */
  .hero-card {
    background: #FFFFFF;
    border-radius: 18px;
    padding: 28px 24px 24px;
    text-align: center;
    width: 100%;
    margin-bottom: 16px;
    border: 2px solid rgba(201,150,12,0.35);
  }
  .hero-eyebrow {
    font-size: 14px; font-weight: 600; color: #5C5764;
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
  }
  .hero-pct {
    font-family: 'Libre Baskerville', serif;
    font-size: 120px; font-weight: 700; color: #1A1820;
    line-height: 120px; letter-spacing: -3px; margin-bottom: 4px;
  }
  .hero-score-text { font-size: 20px; font-weight: 500; color: #5C5764; }

  /* Timeline */
  .timeline-card {
    background: #FFFFFF; border-radius: 18px;
    border: 1px solid rgba(0,0,0,0.08); padding: 20px;
    width: 100%; margin-bottom: 16px;
  }
  .dots-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .dot { width: 18px; height: 18px; border-radius: 4px; }
  .dot.g { background: #1E8F56; }
  .dot.r { background: #C43030; }

  .stats-row {
    display: flex; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 14px;
  }
  .stat-col { flex: 1; text-align: center; position: relative; }
  .stat-col + .stat-col::before {
    content: ''; position: absolute; left: 0; top: 4px;
    height: 36px; width: 1px; background: rgba(0,0,0,0.08);
  }
  .stat-val {
    font-family: 'Libre Baskerville', serif;
    font-size: 22px; font-weight: 700; color: #1A1820; letter-spacing: -0.5px;
  }
  .stat-unit { font-size: 14px; font-weight: 600; color: #5C5764; }
  .stat-label {
    font-size: 13px; font-weight: 600; color: #8A8494;
    text-transform: uppercase; letter-spacing: 1.2px; margin-top: 2px;
  }
  .new-best {
    display: inline-block; background: rgba(233,186,76,0.12);
    border-radius: 999px; padding: 2px 8px;
    font-size: 12px; font-weight: 600; color: #9A5C0A;
    text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;
  }

  /* Share */
  .share-card {
    background: #FFFFFF; border-radius: 18px; padding: 18px 20px;
    text-align: center; width: 100%; margin-bottom: 16px;
  }
  .share-title {
    font-size: 14px; font-weight: 600; color: #5C5764;
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 12px;
  }
  .share-grid { display: flex; flex-direction: column; gap: 6px; align-items: center; margin-bottom: 12px; }
  .share-row { display: flex; gap: 6px; }
  .share-cell { width: 46px; height: 46px; border-radius: 8px; }
  .sc-g { background: #1E8F56; }
  .sc-d { background: #D5CFC6; }

  /* Buttons */
  .action-row { display: flex; gap: 10px; width: 100%; margin-top: 8px; margin-bottom: 12px; }
  .btn-primary {
    flex: 1; background: #E9BA4C; border-radius: 14px; padding: 14px 18px;
    text-align: center; box-shadow: 0 4px 0 #5C3506;
  }
  .btn-primary-text {
    font-size: 17px; font-weight: 600; color: #130F00;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .btn-secondary {
    flex: 1; background: #FFFFFF; border: 1px solid rgba(0,0,0,0.08);
    border-radius: 14px; padding: 14px 18px; text-align: center;
  }
  .btn-secondary-text {
    font-size: 17px; font-weight: 600; color: #5C5764;
    text-transform: uppercase; letter-spacing: 0.8px;
  }

  /* Review */
  .review-section { width: 100%; }
  .review-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .review-title { font-size: 22px; font-weight: 600; color: #1A1820; }
  .review-item {
    display: flex; align-items: center; background: #FFFFFF;
    border-radius: 10px; padding: 12px 14px; margin-bottom: 6px;
    gap: 12px; position: relative; overflow: hidden;
  }
  .review-item .bar {
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 10px 0 0 10px;
  }
  .review-idx {
    font-family: 'Libre Baskerville', serif;
    font-size: 14px; font-weight: 700; min-width: 20px;
    text-align: center; margin-left: 6px;
  }
  .review-flag {
    width: 40px; height: 27px; border-radius: 4px;
    overflow: hidden; background: #EDE7DE; flex-shrink: 0;
  }
  .review-flag img { width: 100%; height: 100%; object-fit: cover; }
  .review-name { flex: 1; font-size: 17px; font-weight: 600; color: #1A1820; }
  .review-time { font-size: 13px; font-weight: 500; color: #8A8494; }
</style>
</head>
<body>

<div class="headline">
  <h1>Track every answer.<br><em>Crush your</em><br><em>high score.</em></h1>
</div>

<div class="phone">
  <div class="screen">
    <div class="status-bar">
      <span>9:41</span>
      <svg width="16" height="12" viewBox="0 0 20 14" fill="#1A1820"><rect x="0" y="8" width="3" height="6" rx="0.5"/><rect x="5" y="5" width="3" height="9" rx="0.5"/><rect x="10" y="2" width="3" height="12" rx="0.5"/><rect x="15" y="0" width="3" height="14" rx="0.5"/></svg>
    </div>

    <div class="app-content">
      <div class="hero-card">
        <div class="hero-eyebrow">Daily Challenge</div>
        <div class="hero-pct">90%</div>
        <div class="hero-score-text">9 of 10 correct</div>
      </div>

      <div class="timeline-card">
        <div class="dots-row">
          <div class="dot g"></div><div class="dot g"></div><div class="dot g"></div><div class="dot g"></div><div class="dot r"></div>
          <div class="dot g"></div><div class="dot g"></div><div class="dot g"></div><div class="dot g"></div><div class="dot g"></div>
        </div>
        <div class="stats-row">
          <div class="stat-col">
            <div class="stat-val">5</div>
            <div class="stat-label">Best Streak</div>
            <div class="new-best">New Best</div>
          </div>
          <div class="stat-col">
            <div class="stat-val">2.1<span class="stat-unit">s</span></div>
            <div class="stat-label">Avg Time</div>
          </div>
          <div class="stat-col">
            <div class="stat-val">1.2<span class="stat-unit">s</span></div>
            <div class="stat-label">Fastest</div>
          </div>
        </div>
      </div>

      <div class="share-card">
        <div class="share-title">FlagThat Daily #47</div>
        <div class="share-grid">
          <div class="share-row">
            <div class="share-cell sc-g"></div><div class="share-cell sc-g"></div><div class="share-cell sc-g"></div><div class="share-cell sc-g"></div><div class="share-cell sc-d"></div>
          </div>
          <div class="share-row">
            <div class="share-cell sc-g"></div><div class="share-cell sc-g"></div><div class="share-cell sc-g"></div><div class="share-cell sc-g"></div><div class="share-cell sc-g"></div>
          </div>
        </div>
      </div>

      <div class="action-row">
        <div class="btn-primary"><span class="btn-primary-text">Play Again</span></div>
        <div class="btn-secondary"><span class="btn-secondary-text">Share</span></div>
      </div>

      <div class="review-section">
        <div class="review-head"><span class="review-title">Review</span></div>
        <div class="review-item">
          <div class="bar" style="background:#1E8F56"></div>
          <div class="review-idx" style="color:#1E8F56">1</div>
          <div class="review-flag"><img src="https://flagcdn.com/w160/lc.png" alt=""></div>
          <span class="review-name">Saint Lucia</span>
          <span class="review-time">1.8s</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E8F56" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg>
        </div>
        <div class="review-item">
          <div class="bar" style="background:#1E8F56"></div>
          <div class="review-idx" style="color:#1E8F56">2</div>
          <div class="review-flag"><img src="https://flagcdn.com/w160/dj.png" alt=""></div>
          <span class="review-name">Djibouti</span>
          <span class="review-time">1.2s</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E8F56" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg>
        </div>
        <div class="review-item">
          <div class="bar" style="background:#1E8F56"></div>
          <div class="review-idx" style="color:#1E8F56">3</div>
          <div class="review-flag"><img src="https://flagcdn.com/w160/de.png" alt=""></div>
          <span class="review-name">Germany</span>
          <span class="review-time">2.4s</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E8F56" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg>
        </div>
        <div class="review-item">
          <div class="bar" style="background:#C43030"></div>
          <div class="review-idx" style="color:#C43030">4</div>
          <div class="review-flag"><img src="https://flagcdn.com/w160/td.png" alt=""></div>
          <span class="review-name">Chad</span>
          <span class="review-time">4.1s</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C43030" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </div>
        <div class="review-item">
          <div class="bar" style="background:#1E8F56"></div>
          <div class="review-idx" style="color:#1E8F56">5</div>
          <div class="review-flag"><img src="https://flagcdn.com/w160/jp.png" alt=""></div>
          <span class="review-name">Japan</span>
          <span class="review-time">1.5s</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E8F56" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
