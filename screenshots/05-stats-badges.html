<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>Flag That - Screenshot 5: Stats & Badges</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── TEMPLATE: dark bg ── */
  body {
    width: 1290px; height: 2796px; overflow: hidden;
    background: #1A1820;
    font-family: 'Barlow', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  body::before {
    content: ''; position: absolute; top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1400px; height: 1400px;
    background: radial-gradient(circle, rgba(233,186,76,0.07) 0%, transparent 65%);
    pointer-events: none;
  }
  .headline {
    text-align: center; padding: 140px 100px 20px;
    flex-shrink: 0; z-index: 2;
  }
  .headline h1 {
    font-family: 'Barlow', sans-serif;
    font-size: 108px; font-weight: 900; color: #FFFFFF;
    line-height: 1.0; letter-spacing: -3px;
  }
  .headline h1 em {
    font-family: 'Libre Baskerville', serif;
    font-weight: 700; font-style: italic; color: #E9BA4C;
  }
  .headline .sub {
    font-size: 36px; font-weight: 500; color: rgba(255,255,255,0.40);
    margin-top: 18px; letter-spacing: 1px;
  }
  .phone-wrap { position: relative; flex-shrink: 0; z-index: 1; margin-top: 50px; }
  .phone {
    width: 1080px; height: 2400px;
    background: linear-gradient(180deg, #7A7680 0%, #5E5A64 50%, #7A7680 100%);
    border-radius: 58px; padding: 2px; position: relative;
  }
  .phone::before {
    content: ''; position: absolute; right: -3px; top: 280px;
    width: 3px; height: 80px;
    background: linear-gradient(180deg, #7A7680, #5E5A64, #7A7680);
    border-radius: 0 2px 2px 0;
  }
  .phone-inner {
    width: 100%; height: 100%; background: #000;
    border-radius: 56px; padding: 5px; position: relative;
  }
  .phone-inner::before {
    content: ''; position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 126px; height: 36px; background: #000;
    border-radius: 20px; z-index: 10;
  }
  .screen {
    width: 100%; height: 100%; background: #F5EFE6;
    border-radius: 52px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar {
    padding: 18px 50px 10px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 20px; font-weight: 600; color: #1A1820;
  }

  /* ── SCREEN CONTENT: Stats ── */
  .screen-content {
    flex: 1; padding: 20px 60px 0;
    display: flex; flex-direction: column; overflow: hidden;
  }

  .page-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 72px; font-weight: 700; color: #1A1820;
    letter-spacing: -1px; padding: 10px 0 32px;
  }

  .hero-card {
    background: #FFFFFF; border-radius: 28px; padding: 40px;
    display: flex; margin-bottom: 32px;
  }
  .hero-col { flex: 1; text-align: center; position: relative; }
  .hero-col + .hero-col { border-left: 2px solid rgba(0,0,0,0.06); }
  .hero-val {
    font-family: 'Libre Baskerville', serif;
    font-size: 64px; font-weight: 700;
  }
  .hero-label {
    font-size: 26px; font-weight: 700; color: #8A8494;
    text-transform: uppercase; letter-spacing: 2px; margin-top: 6px;
  }
  .streak-flex { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
  .pips { display: flex; gap: 9px; margin-top: 10px; justify-content: center; }
  .pip { width: 16px; height: 16px; border-radius: 50%; }
  .pip.on { background: #E9BA4C; }
  .pip.off { background: #D5CFC6; }

  .level-card {
    background: #FFFFFF; border-radius: 28px; padding: 36px 40px; margin-bottom: 36px;
  }
  .level-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .level-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 60px; font-weight: 700; color: #1A1820;
  }
  .level-title span { color: #E9BA4C; }
  .level-xp { font-size: 30px; font-weight: 600; color: #8A8494; }
  .level-bar { height: 16px; background: rgba(0,0,0,0.06); border-radius: 999px; overflow: hidden; }
  .level-fill { height: 100%; background: #E9BA4C; border-radius: 999px; width: 65%; }

  .section-head {
    font-size: 44px; font-weight: 700; color: #1A1820;
    margin: 8px 0 24px;
  }

  .badge-grid { display: flex; flex-wrap: wrap; gap: 20px; }
  .badge-item {
    width: calc(50% - 10px); background: #FFFFFF; border-radius: 24px;
    padding: 30px; display: flex; align-items: center; gap: 22px;
  }
  .badge-icon {
    width: 80px; height: 80px; border-radius: 22px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .badge-info { flex: 1; }
  .badge-name { font-size: 32px; font-weight: 700; color: #1A1820; }
  .badge-desc { font-size: 24px; font-weight: 500; color: #8A8494; margin-top: 4px; }
  .badge-item.locked { opacity: 0.25; }
  .badge-item.locked .badge-name { color: #8A8494; }
  .badge-bar { height: 8px; background: rgba(0,0,0,0.06); border-radius: 4px; margin-top: 10px; overflow: hidden; }
  .badge-bar-fill { height: 100%; background: #E9BA4C; border-radius: 4px; }
</style>
</head>
<body>

<div class="headline">
  <h1>Collect all <em>31 badges</em></h1>
  <div class="sub">Level up as you master flags.</div>
</div>

<div class="phone-wrap">

        </div>

                <span class="hero-val" style="color:#E9BA4C">12</span>

              </div>
            </div>
            <div class="hero-col">
              <div class="hero-val" style="color:#1E8F56">87%</div>
              <div class="hero-label">Accuracy</div>

            <div class="hero-col">
              <div class="hero-val" style="color:#1A1820">847</div>
              <div class="hero-label">Played</div>
            </div>
          </div>
          <div class="level-card">
            <div class="level-top">
              <div class="level-title">Level <span>14</span></div>
              <div class="level-xp">2,450 / 3,800 XP</div>
            </div>
            <div class="level-bar"><div class="level-fill"></div></div>
          </div>
          <div class="section-head">Badges</div>
          <div class="badge-grid">
            <div class="badge-item">
              <div class="badge-icon" style="background:rgba(233,186,76,0.15)"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#E9BA4C" stroke-width="1.5"><polyline points="4 12 10 18 20 6"/><circle cx="12" cy="12" r="10"/></svg></div>
              <div class="badge-info"><div class="badge-name">Perfect 10</div><div class="badge-desc">10/10 in a quiz</div></div>
            </div>
            <div class="badge-item">

              <div class="badge-info"><div class="badge-name">Hot Streak</div><div class="badge-desc">7-day streak</div></div>
            </div>
            <div class="badge-item">
              <div class="badge-icon" style="background:rgba(196,136,74,0.15)"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#C4884A" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3 C8 7 8 17 12 21 C16 17 16 7 12 3Z"/></svg></div>
              <div class="badge-info"><div class="badge-name">Globe Trotter</div><div class="badge-desc">All regions tried</div></div>
            </div>
            <div class="badge-item">
              <div class="badge-icon" style="background:rgba(77,168,232,0.15)"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4DA8E8" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg></div>
              <div class="badge-info"><div class="badge-name">Speed Demon</div><div class="badge-desc">Under 2s avg</div></div>
            </div>
            <div class="badge-item">
              <div class="badge-icon" style="background:rgba(233,186,76,0.15)"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#E9BA4C" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
              <div class="badge-info"><div class="badge-name">Daily Legend</div><div class="badge-desc">30-day streak</div></div>
            </div>
            <div class="badge-item locked">
              <div class="badge-icon" style="background:rgba(0,0,0,0.04)"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#8A8494" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
              <div class="badge-info"><div class="badge-name">???</div><div class="badge-bar"><div class="badge-bar-fill" style="width:60%"></div></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
